name: Reusable Deploy
on:
  workflow_call:
    inputs:
      artifact-name:
        description: The name of deployable artifact files
        required: false
        default: dist
        type: string
    outputs:
      result:
        description: The result of Deployment
        value: ${{  jobs.deploy.output.outcome}}
    # secrets:
    #   some-secret:
    #     required: true
jobs:
  deploy:
    outputs:
      outcome: ${{ steps.set-result.outputs.set-result }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
      - name: List files
        run: ls
      - name: Output information
        run: echo "Deploying & uploading..."
      - name: Set output result
        id: set-result
        run: echo "step-result=success" >> $GITHUB_OUTPUT
